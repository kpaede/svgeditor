name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag/version. Leave empty to use manifest.json version."
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: npm

      - name: Resolve release tag
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="$(node -p "require('./manifest.json').version")"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        run: |
          tag="${{ steps.release.outputs.tag }}"
          manifest_version="$(node -p "require('./manifest.json').version")"

          if [[ "$tag" != "$manifest_version" ]]; then
            echo "::error::Release tag '$tag' must match manifest.json version '$manifest_version'."
            exit 1
          fi

          if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "$tag")"
            if [[ "$tag_sha" != "$GITHUB_SHA" ]]; then
              echo "::error::Tag '$tag' points to $tag_sha, but this workflow is building $GITHUB_SHA. Bump the version and create a new tag, or move the tag intentionally before releasing."
              exit 1
            fi
          fi

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js

      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: styles.css

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release.outputs.tag }}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            --target="${GITHUB_SHA}" \
            main.js manifest.json styles.css
